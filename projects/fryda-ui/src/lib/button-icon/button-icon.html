<button
  [class]="cssClass"
  [disabled]="variant === 'disabled'"
  [attr.aria-label]="ariaLabel"
  type="button"
>
  <!-- Spinner: solo visible en estado loading -->
  <span *ngIf="variant === 'loading'" class="btn-icon__spinner" aria-hidden="true"></span>

  <!-- Ícono — currentColor hereda el color del estado activo -->
  <span *ngIf="variant !== 'loading'" class="btn-icon__icon" aria-hidden="true">
    <span class="btn-icon__vector">

      <!-- Arrow up-right (default) -->
      <svg *ngIf="icon === 'arrow'"
        width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M1 0L11 4.37114e-07C11.5523 4.61255e-07 12 0.447716 12 1V11C12 11.5523
             11.5523 12 11 12C10.4477 12 10 11.5523 10 11V3.41406L2.70703
             10.707C2.31651 11.0976 1.68349 11.0976 1.29297 10.707C0.902444
             10.3165 0.902444 9.68349 1.29297 9.29297L8.58594 2L1 2C0.447715
             2 -2.41411e-08 1.55228 0 1C2.41411e-08 0.447715 0.447715
             -2.41412e-08 1 0Z"
          fill="currentColor"/>
      </svg>

      <!-- Close / X -->
      <svg *ngIf="icon === 'close'"
        width="12" height="12" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M16.2929 0.292893C16.6834 -0.097631 17.3164 -0.097631 17.707 0.292893C18.0975 0.683418
             18.0975 1.31643 17.707 1.70696L10.414 8.99992L17.707 16.2929C18.0975 16.6834 18.0975
             17.3164 17.707 17.707C17.3164 18.0975 16.6834 18.0975 16.2929 17.707L8.99992 10.414L
             1.70696 17.707C1.31643 18.0975 0.683418 18.0975 0.292893 17.707C-0.097631 17.3164
             -0.097631 16.6834 0.292893 16.2929L7.58586 8.99992L0.292893 1.70696C-0.0976311 1.31643
             -0.0976311 0.683418 0.292893 0.292893C0.683418 -0.0976311 1.31643 -0.0976311 1.70696
             0.292893L8.99992 7.58586L16.2929 0.292893Z"
          fill="currentColor"/>
      </svg>

    </span>
  </span>
</button>
