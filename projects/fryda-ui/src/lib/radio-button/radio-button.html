<label [class]="hostClass">
  <!-- Input nativo — mantiene accesibilidad y semántica real -->
  <input
    class="radio__input"
    type="radio"
    [name]="name"
    [attr.value]="label"
    [checked]="checked"
    [disabled]="isDisabled"
    [attr.aria-label]="label || null"
    (change)="handleChange()"
  />

  <!-- State layer (40×40) — fondo circular en hover / pressed -->
  <span class="radio__state-layer" aria-hidden="true">

    <!-- Control (24×24) — círculo principal -->
    <span class="radio__control">

      <!-- Indicator (12×12) — punto interior cuando está seleccionado -->
      <span class="radio__indicator"></span>

    </span>
  </span>
</label>
